<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ i18n.t('nav_login') }} | {{ i18n.t('brand_name') }}</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    {% include "header.html" %}

    <main class="page-content">
        <section class="page-hero compact">
            <div>
                <span class="eyebrow">{{ i18n.t('login') }}</span>
                <h1>{{ i18n.t('login') }}</h1>
                <p>Logge dich ein, um deinen Warenkorb und Bestellungen zu verwalten.</p>
            </div>
            <div class="form-card">
                <h2>{{ i18n.t('login') }}</h2>
                <form id="login-form">
                    <div class="input-group">
                        <label for="email">{{ i18n.t('email') }}</label>
                        <input type="email" id="email" required>
                    </div>
                    <div class="input-group">
                        <label for="password">{{ i18n.t('password') }}</label>
                        <input type="password" id="password" required>
                    </div>
                    <button class="btn-primary" type="submit">{{ i18n.t('login') }}</button>
                </form>
                <p class="small-note">{{ i18n.t('register') }}? <a href="/user/register">{{ i18n.t('nav_register') }}</a></p>
            </div>
        </section>
    </main>

    {% include "footer.html" %}
    <script src="/static/js/app.js"></script>
</body>
</html>
