<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | TestShopPython</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <header class="site-header">
        <div class="nav-bar">
            <div class="logo">TestShopPython</div>
            <nav class="menu">
                <a href="/">Home</a>
                <a href="/shop/products">Shop</a>
                <a href="/shop/cart">Warenkorb</a>
                <a href="/shop/login">Login</a>
            </nav>
        </div>
    </header>

    <main class="page-content">
        <section class="page-hero compact">
            <div>
                <span class="eyebrow">Mitglied werden</span>
                <h1>Willkommen zurück</h1>
                <p>Logge dich ein, um deine Bestellungen einzusehen und schneller einzukaufen.</p>
            </div>
            <div class="form-card">
                <h2>Login</h2>
                <form id="login-form">
                    <div class="input-group">
                        <label for="email">E-Mail</label>
                        <input type="email" id="email" required>
                    </div>
                    <div class="input-group">
                        <label for="password">Passwort</label>
                        <input type="password" id="password" required>
                    </div>
                    <button class="btn-primary" type="submit">Einloggen</button>
                </form>
                <p class="small-note">Noch kein Konto? <a href="/shop/register">Registrieren</a></p>
            </div>
        </section>
    </main>

    <footer class="site-footer">
        <div>
            <h4>TestShopPython</h4>
            <p>Schöner wohnen mit stilvollen Wohnaccessoires.</p>
        </div>
    </footer>

    <script src="/static/js/app.js"></script>
</body>
</html>
