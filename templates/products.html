<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop | OWRE</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    {% include "header.html" %}

    <main class="product-page">
        <section class="page-header">
            <h1>Unsere Produkte</h1>
            <p>Entdecken Sie unsere komplette Kollektion an Aufbewahrungslösungen.</p>
        </section>

        <section class="filters">
            <button class="filter-btn active">Alle</button>
            <button class="filter-btn">Körbe</button>
            <button class="filter-btn">Boxen</button>
            <button class="filter-btn">Organizer</button>
        </section>

        <section class="products-grid" id="products-list">
            <div class="product-card">
                <div class="content">
                    <p class="small-note">Produkte werden geladen …</p>
                </div>
            </div>
        </section>
    </main>

    {% include "footer.html" %}
    <script src="/static/js/app.js"></script>
</body>
</html>
