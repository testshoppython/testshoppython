<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop | OWRE</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <header class="site-header">
        <div class="nav-bar">
            <div class="logo">OWRE</div>
            <nav class="menu">
                <a href="/">Home</a>
                <a href="/shop/products">Shop</a>
                <a href="/shop/cart">Warenkorb</a>
                <a href="/shop/login">Mein Konto</a>
            </nav>
            <div class="header-actions">
                <button class="search-btn">🔍</button>
                <a href="/shop/cart" class="cart-icon">🛒</a>
            </div>
        </div>
    </header>

    <main class="product-page">
        <div class="page-header">
            <h1>Unsere Produkte</h1>
            <p>Entdecken Sie unsere komplette Kollektion an Aufbewahrungslösungen.</p>
        </div>

        <div class="filters">
            <button class="filter-btn active">Alle</button>
            <button class="filter-btn">Körbe</button>
            <button class="filter-btn">Boxen</button>
            <button class="filter-btn">Organizer</button>
        </div>

        <div class="products-grid" id="products-list"></div>
    </main>

    <footer class="site-footer">
        <div class="footer-content">
            <div class="footer-section">
                <h4>OWRE</h4>
                <p>Premium Aufbewahrungslösungen.</p>
            </div>
        </div>
        <div class="footer-bottom">
            <p>&copy; 2024 OWRE.</p>
        </div>
    </footer>

    <script src="/static/js/app.js"></script>
</body>
</html>
