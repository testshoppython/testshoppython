<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ i18n.t('product_name') }} | {{ i18n.t('brand_name') }}</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    {% include "header.html" %}

    <main class="page-content">
        <section class="page-hero compact">
            <div>
                <span class="eyebrow">{{ i18n.t('product_name') }}</span>
                <h1>Produktdetails</h1>
                <p>Hier findest du alle Informationen zum ausgewählten Produkt.</p>
            </div>
        </section>

        <section class="product-detail">
            <div class="product-detail-card">
                <div id="product-detail"></div>
                <button class="btn-primary" id="add-to-cart">{{ i18n.t('add_to_cart') }}</button>
            </div>
        </section>
    </main>

    {% include "footer.html" %}
    <script src="/static/js/app.js"></script>
</body>
</html>
