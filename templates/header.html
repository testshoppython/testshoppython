<header class="site-header">
  <div class="top-bar">
    <span>Kostenloser Versand ab €50 | 30 Tage Rückgaberecht</span>
    <a href="/shop/login" class="auth-link">Mein Konto</a>
  </div>
  <div class="nav-bar">
    <!-- Logo Block -->
    <div class="logo-block">
      <a href="/">
        <img src="/static/images/owre_logo.png" alt="OWRE Logo" class="logo-image">
      </a>
    </div>

    <!-- Mobile Menu Toggle -->
    <button id="mobile-menu-toggle" class="mobile-menu-toggle" aria-label="Menü öffnen">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path id="menu-icon-path" stroke-linecap="round" stroke-linejoin="round"
          d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" />
      </svg>
    </button>

    <!-- Navigation Links Block -->
    <div class="nav-links-block">
      <nav class="menu">
        <a href="/">Startseite</a>
        <a href="/shop/products">Shop</a>
        <a href="/info/about">Über uns</a>
        <!--<a href="/shop/cart">Warenkorb</a>-->
        <a href="/shop/orders" class="user-only" style="display:none;">Bestellungen</a>
        <a href="/shop/admin" class="admin-only" style="display:none;">Admin</a>
        <a href="/info/impressum">Impressum</a>
      </nav>
    </div>

    <!-- Header Actions Block -->
    <div class="header-actions-block">
      <button class="search-btn" title="Suchen">🔍</button>
      <a href="/shop/login" class="btn-ghost auth-link" title="Mein Konto">👤</a>
      <a href="/shop/cart" class="cart-icon" title="Warenkorb">
        🛒
        <span class="badge" id="cart-badge">0</span>
      </a>
    </div>

    <!-- Westwing Style Search Overlay -->
    <div id="search-overlay" class="search-overlay">
      <div class="search-modal-content">
        <div class="search-input-wrapper">
          <input type="text" id="search-input" placeholder="" autocomplete="off">
          <button id="close-search" class="close-search">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
            </svg>
          </button>
        </div>
        <div id="search-results-container" class="search-results-container">
          <div class="search-top-row">
            <div class="search-column">
              <h4 class="search-col-title">VORSCHLÄGE</h4>
              <div id="search-suggestions" class="search-list">
                <p class="search-muted">Tippen Sie etwas ein...</p>
              </div>
            </div>
            <div class="search-column">
              <h4 class="search-col-title">KATEGORIEN</h4>
              <div id="search-categories" class="search-list">
              </div>
            </div>
          </div>
          <div class="search-bottom-row" id="search-products-section">
            <h4 class="search-col-title">PRODUKTE</h4>
            <div id="search-products-grid" class="search-products-grid"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</header>
