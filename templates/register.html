<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrieren | TestShopPython</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <header class="site-header">
        <div class="nav-bar">
            <div class="logo">TestShopPython</div>
            <nav class="menu">
                <a href="/">Home</a>
                <a href="/shop/products">Shop</a>
                <a href="/shop/cart">Warenkorb</a>
                <a href="/shop/login">Login</a>
            </nav>
        </div>
    </header>

    <main class="page-content">
        <section class="page-hero compact">
            <div>
                <span class="eyebrow">Neu hier?</span>
                <h1>Erstelle dein Konto</h1>
                <p>Registriere dich und speichere deine Lieblingsprodukte im Warenkorb.</p>
            </div>
            <div class="form-card">
                <h2>Registrieren</h2>
                <form id="register-form">
                    <div class="input-group">
                        <label for="name">Name</label>
                        <input type="text" id="name" required>
                    </div>
                    <div class="input-group">
                        <label for="email">E-Mail</label>
                        <input type="email" id="email" required>
                    </div>
                    <div class="input-group">
                        <label for="password">Passwort</label>
                        <input type="password" id="password" required>
                    </div>
                    <button class="btn-primary" type="submit">Registrieren</button>
                </form>
                <p class="small-note">Hast du schon ein Konto? <a href="/shop/login">Login</a></p>
            </div>
        </section>
    </main>

    <footer class="site-footer">
        <div>
            <h4>TestShopPython</h4>
            <p>Stilvolle Einrichtung leicht gemacht.</p>
        </div>
    </footer>

    <script src="/static/js/app.js"></script>
</body>
</html>
