<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ i18n.t('register') }} | {{ i18n.t('brand_name') }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    {% include "header.html" %}

    <main class="page-content">
        <section class="page-hero compact">
            <div>
                <span class="eyebrow">{{ i18n.t('register') }}</span>
                <h1>{{ i18n.t('register') }}</h1>
                <p>Erstellen Sie Ihr OWRE Konto und shoppen Sie mit persönlichem Warenkorb.</p>
            </div>
            <div class="form-card">
                <h2>{{ i18n.t('register') }}</h2>
                <form id="register-form">
                    <div class="input-group">
                        <label for="firstname">{{ i18n.t('firstname') }}</label>
                        <input type="text" id="firstname" required>
                    </div>
                    <div class="input-group">
                        <label for="lastname">{{ i18n.t('lastname') }}</label>
                        <input type="text" id="lastname" required>
                    </div>
                    <div class="input-group">
                        <label for="username">{{ i18n.t('username') }}</label>
                        <input type="text" id="username" required>
                    </div>
                    <div class="input-group">
                        <label for="email">{{ i18n.t('email') }}</label>
                        <input type="email" id="email" required>
                    </div>
                    <div class="input-group">
                        <label for="password">{{ i18n.t('password') }}</label>
                        <input type="password" id="password" required>
                    </div>
                    <button class="btn-primary" type="submit">{{ i18n.t('register') }}</button>
                </form>
                <p class="small-note">{{ i18n.t('login') }}? <a href="/shop/login">{{ i18n.t('nav_login') }}</a></p>
            </div>
        </section>
    </main>

    {% include "footer.html" %}
    <script src="/static/js/app.js"></script>
</body>
</html>
