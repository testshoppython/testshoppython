services:
  - type: web
    name: testshoppython
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt && python -m alembic upgrade head || true
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port 10000
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
      - key: DATABASE_URL
        value: postgresql://${DATABASE_USER}:${DATABASE_PASSWORD}@${DATABASE_HOST}:${DATABASE_PORT}/${DATABASE_NAME}
      - key: ENVIRONMENT
        value: production
      - key: SECRET_KEY
        value: your-secret-key-change-me

databases:
  - name: testshop_db
    databaseName: testshop
    user: render_user