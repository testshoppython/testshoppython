services:
  - type: web
    name: owre-shop
    env: python
    runtime: python
    runtimeVersion: 3.11.7
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port 10000
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./owre.db
      - key: ENVIRONMENT
        value: production
      - key: SECRET_KEY
        value: change-this-to-a-random-string
      - key: DEFAULT_LANGUAGE
        value: de
      - key: RENDER
        value: "True"

# Optional: Add PostgreSQL database for production
# Uncomment the section below to use PostgreSQL instead of SQLite
# databases:
#   - name: owre_db
#     databaseName: owre_production
#     user: owre_user
#
# Then update DATABASE_URL in envVars to:
#   - key: DATABASE_URL
#     value: postgresql://${DATABASE_USER}:${DATABASE_PASSWORD}@${DATABASE_HOST}:${DATABASE_PORT}/${DATABASE_NAME}